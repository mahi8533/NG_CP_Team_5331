{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KrishiMitra | Create Account</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-card">

    <div class="card-header">
        <h1>Create Account</h1>
        <p>Join KrishiMitra</p>
    </div>

    {% if messages %}
    <div class="flash-wrap">
        {% for message in messages %}
        <div class="flash-msg">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'signup' %}">
        {% csrf_token %}

        <!-- Full Name -->
        <div class="form-group">
            <label>Full Name</label>
            <input 
                type="text"
                name="full_name"
                placeholder="Your full name"
                pattern="[A-Za-z ]+"
                title="Name should contain only letters and spaces"
                required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label>Email</label>
            <input 
                type="email"
                name="email"
                placeholder="example@gmail.com"
                required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label>Password</label>
            <input 
                type="password"
                name="password"
                placeholder="Min 8 chars, 1 uppercase, 1 number"
                pattern="(?=.*\d)(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
                title="Password must be at least 8 characters long, include 1 uppercase letter, 1 number, and 1 special character"
                required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Re-enter password"
                required>
        </div>

        <button class="login-btn">Create Account</button>

        <div class="auth-links">
            <a href="{% url 'login' %}">Already have an account?</a>
        </div>

    </form>

</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const lang = localStorage.getItem("language") || "en";

    if (lang === "hi") {
        document.querySelector("h1").innerText = "खाता बनाएँ";
        document.querySelector("p").innerText = "कृषि मित्र से जुड़ें";

        document.querySelectorAll("label")[0].innerText = "पूरा नाम";
        document.querySelectorAll("label")[1].innerText = "ईमेल";
        document.querySelectorAll("label")[2].innerText = "पासवर्ड";

        document.querySelector("button").innerText = "खाता बनाएँ";
        document.querySelector(".auth-links a").innerText = "पहले से खाता है?";
    }
});
</script>
<script src="{% static 'js/language.js' %}"></script>

</body>
</html>
