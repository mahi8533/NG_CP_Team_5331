{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KrishiMitra | Forgot Password</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-card">

    <div class="card-header">
        <h1>Forgot Password</h1>
        <p>Reset your account password</p>
    </div>

    {% if messages %}
    <div class="flash-wrap">
        {% for message in messages %}
        <div class="flash-msg">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'forgot_password' %}">
        {% csrf_token %}

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Enter your registered email"
                required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input
                type="password"
                name="new_password"
                placeholder="Enter new password"
                required>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Re-enter new password"
                required>
        </div>

        <button class="login-btn">Send Reset Link</button>

        <div class="auth-links">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const lang = localStorage.getItem("language") || "en";

    if (lang === "hi") {
        document.querySelector("h1").innerText = "पासवर्ड भूल गए";
        document.querySelector("p").innerText = "अपना पासवर्ड रीसेट करें";

        document.querySelector("label").innerText = "ईमेल";
        document.querySelector("button").innerText = "रीसेट लिंक भेजें";
        document.querySelector(".auth-links a").innerText = "लॉगिन पर वापस जाएँ";
    }
});
</script>
<script src="{% static 'js/language.js' %}"></script>

</body>
</html>
